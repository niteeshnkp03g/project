<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Chakli ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Georgia', serif;
    background: linear-gradient(135deg, #2b2e4a, #e84545);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

.card {
    width: 90%;
    max-width: 420px;
    padding: 25px;
    border-radius: 20px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    text-align: center;
    box-shadow: 0 0 40px rgba(0,0,0,0.4);
}

p {
    font-size: 18px;
    line-height: 1.6;
    background: rgba(255,255,255,0.1);
    padding: 15px;
    border-radius: 12px;
}

h3 {
    margin: 10px 0;
    color: #ffd1dc;
    font-weight: normal;
}

button {
    padding: 10px 18px;
    margin-top: 20px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.next { background: white; color: #333; }
.yes { background: #ff4d6d; color: white; position: absolute; }
.no { background: #444; color: white; position: absolute; }

input {
    padding: 10px;
    border-radius: 8px;
    border: none;
    width: 80%;
    margin-top: 10px;
    text-align: center;
    font-size: 18px;
}

img {
    width: 100%;
    border-radius: 15px;
    margin-top: 10px;
}

/* Hearts */
.heart {
    position: absolute;
    animation: float 6s linear infinite;
    opacity: 0.5;
}
@keyframes float {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}
</style>

</head>

<body>

<div class="card" id="card">
    <h2>Hey Chakli ❤️</h2>
    <p>I want to show you something special...</p>
    <button class="next" onclick="nextStep()">Start 💌</button>
</div>

<audio autoplay loop>
<source src="https://www.bensound.com/bensound-music/bensound-love.mp3">
</audio>

<script>

let step = -1;

const shayari = [
"You are my today, my tomorrow, and all my New Years to come. I pray that our love lasts a lifetime and beyond. Love you my beautiful wife.",
"Another year, another chapter of our love story. May this New Year bring us closer, stronger, and more in love than ever. Let’s stay together—today, tomorrow, and forever.",
"As the clock strikes midnight, I hold onto one wish—that we continue to walk hand in hand through every joy and challenge, living together in love forever.",
"With you by my side, every year feels beautiful. This New Year, I wish us endless love, shared dreams, and a forever that never fades."
];

function nextStep() {
    step++;
    const card = document.getElementById("card");

    if (step < shayari.length) {
        card.innerHTML = `
            <h2>For You Chakli ❤️</h2>
            <h3>💌 Day ${step + 1} of Love</h3>
            <p>${shayari[step]}</p>
            <button class="next" onclick="nextStep()">Next 💌</button>
        `;
    }

    else if (step === shayari.length) {
        card.innerHTML = `
            <h2>One Last Thing ❤️</h2>
            <p>Enter our Love Passcode 🔐</p>
            <input type="password" id="passcode" maxlength="8" placeholder="Enter code">
            <br>
            <button class="next" onclick="checkPasscode()">Unlock 💕</button>
            <p id="error" style="color:#ffcccc;"></p>
        `;
    }

    else if (step === shayari.length + 1) {
        card.innerHTML = `
            <h2>Our Journey ❤️</h2>
            <img src="./photo.jpg" alt="Our Memory ❤️">
            <button class="next" onclick="nextStep()">Continue 💕</button>
        `;
    }

    else {
        card.innerHTML = `
            <h2>Chakli ❤️</h2>
            <p>After everything... I just want to ask you one thing</p>
            <h3>Will you be mine forever?</h3>
            <button class="yes" id="yes"> 💖 Yes 💖 </button>
            <button class="no" id="no"> No </button>
        `;
        setupFinal();
    }
}

// 🔒 Netlify function call (your existing setup)
async function checkPasscode() {
    const input = document.getElementById("passcode").value;
    const error = document.getElementById("error");

    try {
        const res = await fetch("/.netlify/functions/verify", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ passcode: input })
        });

        const data = await res.json();

        if (data.success) {
            nextStep();
        } else {
            error.innerText = "💔 Wrong passcode... try again ❤️";
        }
    } catch (err) {
        error.innerText = "⚠️ Server error. Try again later.";
    }
}

// Final step
function setupFinal() {
    const noBtn = document.getElementById("no");

    noBtn.addEventListener("mouseover", () => {
        const x = Math.random() * (window.innerWidth - 100);
        const y = Math.random() * (window.innerHeight - 50);
        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    });

    document.getElementById("yes").onclick = () => {
        const message = encodeURIComponent("I said YES ❤️😍 Forever begins now 💕");
        window.open(`https://api.whatsapp.com/send?text=${message}`, "_blank");

        document.body.innerHTML = `
            <h1 style="text-align:center;margin-top:20%;">
                She said YES ❤️😍<br>Forever Begins Now 💕
            </h1>
        `;
        confetti();
    };
}

// Hearts
setInterval(() => {
    const h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = "❤️";
    h.style.left = Math.random()*100+"vw";
    h.style.fontSize = (Math.random()*20+10)+"px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
},400);

// Confetti
function confetti(){
    for(let i=0;i<150;i++){
        let d=document.createElement("div");
        d.style.position="absolute";
        d.style.width="6px";
        d.style.height="6px";
        d.style.background="white";
        d.style.left=Math.random()*window.innerWidth+"px";
        d.style.top="0";
        d.style.animation="fall 3s linear";
        document.body.appendChild(d);
        setTimeout(()=>d.remove(),3000);
    }
}

const style=document.createElement("style");
style.innerHTML=`@keyframes fall{to{transform:translateY(100vh)}}`;
document.head.appendChild(style);

</script>

</body>
</html>
