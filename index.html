<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💖 For Chakli 💖</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Georgia',serif;
    background:linear-gradient(135deg,#2b2e4a,#e84545);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    padding:20px;
    position:relative;
}

.card{
    width:95%;
    max-width:1100px;
    padding:35px;
    border-radius:28px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(14px);
    text-align:center;
    box-shadow:0 0 40px rgba(0,0,0,0.4);
    position:relative;
    z-index:5;
    overflow:hidden;
}

h2{
    margin-bottom:10px;
    font-size:42px;
}

h3{
    color:#ffd1dc;
    margin-bottom:25px;
    font-size:30px;
}

.memory-container{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:55px;
    margin-top:20px;
}

.image-card{
    position:relative;
    width:340px;
    min-width:340px;
    height:480px;
    padding:10px;
    border-radius:32px;
    overflow:hidden;
    animation:floatCard 3s ease-in-out infinite;
}

.image-card::before{
    content:"";
    position:absolute;
    inset:-3px;
    border-radius:32px;
    background:linear-gradient(
        45deg,
        #ff6b81,
        #ff8fab,
        #ffd6e0,
        #ff6b81
    );
    background-size:300% 300%;
    animation:borderGlow 4s linear infinite;
    z-index:0;
}

.image-card::after{
    content:"";
    position:absolute;
    inset:5px;
    background:#6b3f50;
    border-radius:25px;
    z-index:1;
}

.memory-image{
    position:relative;
    z-index:2;
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:24px;
    animation:imagePulse 2.8s ease-in-out infinite;
}

.quote-card{
    flex:1;
    min-height:480px;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px;
    border-radius:30px;
    background:rgba(255,255,255,0.12);
    position:relative;
    overflow:hidden;
    animation:quoteGlow 3s ease-in-out infinite;
    text-align:left;
}

.quote-card::before{
    content:"💖";
    position:absolute;
    top:12px;
    right:18px;
    font-size:30px;
    animation:blink 1.4s infinite;
}

.quote-text{
    white-space:pre-line;
    line-height:2;
    font-size:25px;
}

.next{
    background:white;
    color:#333;
    padding:14px 26px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    margin-top:28px;
    font-size:17px;
    transition:0.3s;
}

.next:hover{
    transform:scale(1.08);
}

.pass-box{
    background:rgba(255,255,255,0.12);
    padding:30px;
    border-radius:25px;
}

#passcode{
    width:80%;
    padding:14px;
    border-radius:12px;
    border:none;
    outline:none;
    text-align:center;
    font-size:18px;
    margin-bottom:18px;
}

.unlock-btn{
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    border:none;
    padding:14px 28px;
    border-radius:30px;
    color:white;
    font-size:17px;
    cursor:pointer;
}

#error{
    margin-top:10px;
    color:#ffd1dc;
}

.blur{
    filter:blur(20px) brightness(0.7);
    transform:scale(1.05);
    transition:all 2s ease;
}

.clear{
    filter:blur(0);
    transform:scale(1);
}

.heartbeat{
    animation:beat 1s infinite;
}

@keyframes beat{
    0%,100%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.03);
    }
}

@keyframes imagePulse{
    0%,100%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.04);
    }
}

@keyframes borderGlow{
    0%{
        background-position:0% 50%;
    }
    100%{
        background-position:100% 50%;
    }
}

@keyframes floatCard{
    0%,100%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-8px);
    }
}

@keyframes quoteGlow{
    0%,100%{
        box-shadow:0 0 15px rgba(255,255,255,0.1);
    }
    50%{
        box-shadow:0 0 35px rgba(255,192,203,0.4);
    }
}

@keyframes blink{
    0%,100%{
        opacity:1;
    }
    50%{
        opacity:0.3;
    }
}

/* FLOATING SIDE EMOJIS */

.side-emoji{
    position:absolute;
    font-size:28px;
    animation:sideFall linear infinite;
    z-index:1;
    pointer-events:none;
}

@keyframes sideFall{

    0%{
        transform:translateY(-10vh) scale(0.8);
        opacity:0;
    }

    15%{
        opacity:1;
    }

    50%{
        transform:translateY(50vh) translateX(10px) scale(1);
    }

    100%{
        transform:translateY(110vh) translateX(-10px) scale(0.8);
        opacity:0;
    }
}

@media(max-width:900px){

    body{
        padding:15px;
        align-items:flex-start;
    }

    .card{
        margin-top:20px;
        padding:25px;
    }

    .memory-container{
        flex-direction:column;
        gap:35px;
    }

    .image-card{
        width:100%;
        max-width:320px;
        min-width:auto;
        height:430px;
    }

    .quote-card{
        width:100%;
        min-height:auto;
        text-align:center;
        padding:28px;
    }

    .quote-text{
        font-size:20px;
        line-height:1.8;
    }

    h2{
        font-size:30px;
    }

    h3{
        font-size:24px;
    }
}

</style>
</head>

<body>

<div class="card" id="card">

    <h2>💖 Hey Chakli 💖</h2>

    <div class="quote-card" style="min-height:auto; text-align:center;">

        <div class="quote-text">
            I want to show you something special... ❤️
        </div>

    </div>

    <button class="next" onclick="nextStep()">
        Start 💌
    </button>

</div>

<script>

let step=-1;

const memories=[

{
image:"./images/1.jpg",
title:"Year 1 💖",
text:
`The day you entered my life,
love stopped feeling like a dream
and started feeling real.

Without even realizing it,
my heart had already
started calling you home.`
},

{
image:"./images/2.jpg",
title:"Year 2 💖",
text:
`Between endless conversations,
random laughs, silly fights,
and long nights,

you slowly became the person
I could never stay away from.`
},

{
image:"./images/3.png",
title:"Year 3 💖",
text:
`There were moments
when misunderstandings
created distance.

But somehow,
our hearts still searched
for each other every time.`
},

{
image:"./images/4.jpg",
title:"Year 4 💖",
text:
`We learned that love
is not about perfect days,

but about staying together
during difficult moments.`
},

{
image:"./images/5.jpg",
title:"Year 5 💖",
text:
`Your smile became my peace.
Your presence became my comfort.

Even during storms,
we kept choosing
each other again and again.`
},

{
image:"./images/6.jpg",
title:"Year 6 💖",
text:
`We faced emotional nights,
silent moments,
pain, and fears.

Yet somehow,
our love survived everything.`
},

{
image:"./images/7.jpg",
title:"Year 7 💖",
text:
`Forever stopped sounding impossible
because every future
I imagined

always had you beside me,
holding my hand.`
},

{
image:"./images/8.jpg",
title:"Year 8 💖",
text:
`Eight years later,
this love carries patience,
healing, loyalty, and strength.

We never stopped
choosing each other.`
}

];

function nextStep(){

    step++;

    const card=document.getElementById("card");

    if(step < memories.length){

        card.innerHTML=`

            <h2>💖 For You Chakli 💖</h2>

            <h3>${memories[step].title}</h3>

            <div class="memory-container">

                <div class="image-card">

                    <img
                        src="${memories[step].image}"
                        class="memory-image clear"
                    >

                </div>

                <div class="quote-card">

                    <div class="quote-text">

${memories[step].text}

                    </div>

                </div>

            </div>

            <button class="next" onclick="nextStep()">
                Next 💌
            </button>
        `;
    }

    else if(step === memories.length){

        card.innerHTML=`

            <h2>💖 One Last Thing 💖</h2>

            <div class="pass-box">

                <div class="quote-text" style="text-align:center; font-size:22px;">
                    Enter our Love Passcode 🔐
                </div>

                <br>

                <input
                    type="password"
                    id="passcode"
                    placeholder="••••••"
                >

                <br>

                <button
                    class="unlock-btn"
                    onclick="checkPasscode()"
                >
                    Unlock 💕
                </button>

                <p id="error"></p>

            </div>
        `;
    }

    else if(step === memories.length + 1){

        card.innerHTML=`

            <h2>💖 Forever Us 💖</h2>

            <div class="image-card"
                 style="margin:auto; width:360px; height:500px;">

                <img
                    id="loveImage"
                    src="./images/final.jpg"
                    class="memory-image blur"
                >

            </div>

            <div class="quote-card"
                 style="margin-top:30px; min-height:auto;">

                <div
                    id="revealText"
                    class="quote-text"
                    style="text-align:center;"
                ></div>

            </div>

        `;

        setTimeout(revealImage,1500);
    }
}

async function checkPasscode(){

    const input=document.getElementById("passcode").value;

    const error=document.getElementById("error");

    try{

        const res=await fetch("/.netlify/functions/verify",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                passcode:input
            })
        });

        const data=await res.json();

        if(data.success){

            nextStep();

        }else{

            error.innerText="Wrong passcode ❤️";
        }

    }catch{

        error.innerText="Error";
    }
}

function revealImage(){

    const img=document.getElementById("loveImage");

    img.classList.remove("blur");

    img.classList.add("clear","heartbeat");

    const text=

`From strangers to soulmates,
from late-night talks to silent understanding,
from fights to healing,
from holding hands to holding hearts,
we grew through every season together.

Eight years later,
my safest place is still beside you ❤️`;

    let i=0;

    const el=document.getElementById("revealText");

    function type(){

        if(i < text.length){

            el.innerHTML += text.charAt(i);

            i++;

            setTimeout(type,40);
        }
    }

    type();
}

/* SIDE EMOJIS */

const items=[
"🌹","🌷","🌸",
"❤️","💕","💖",
"✨","💘","🥰"
];

setInterval(()=>{

    for(let i=0;i<4;i++){

        const p=document.createElement("div");

        p.className="side-emoji";

        p.innerHTML=
            items[Math.floor(Math.random()*items.length)];

        /* LEFT OR RIGHT */

        const side=Math.random() > 0.5;

        if(side){

            p.style.left=
                (Math.random()*12)+"vw";

        }else{

            p.style.right=
                (Math.random()*12)+"vw";
        }

        p.style.top="-10vh";

        p.style.fontSize=
            (Math.random()*18+20)+"px";

        p.style.animationDuration=
            (Math.random()*4+5)+"s";

        document.body.appendChild(p);

        setTimeout(()=>p.remove(),9000);
    }

},700);

</script>

</body>
</html>
