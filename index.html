<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Chakli ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Georgia', serif;
    background: linear-gradient(135deg, #2b2e4a, #e84545);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

.card {
    width: 90%;
    max-width: 420px;
    padding: 25px;
    border-radius: 20px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    text-align: center;
    box-shadow: 0 0 40px rgba(0,0,0,0.4);
}

p {
    font-size: 18px;
    line-height: 1.6;
    background: rgba(255,255,255,0.1);
    padding: 15px;
    border-radius: 12px;
}

/* 🎨 Day styling */
h3 {
    margin: 10px 0;
    color: #ffd1dc;
    font-weight: normal;
}

button {
    padding: 10px 18px;
    margin-top: 20px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.next { background: white; color: #333; }
.yes { background: #ff4d6d; color: white; position: absolute; }
.no { background: #444; color: white; position: absolute; }

input {
    padding: 10px;
    border-radius: 8px;
    border: none;
    width: 80%;
    margin-top: 10px;
    text-align: center;
    font-size: 18px;
}

img {
    width: 100%;
    border-radius: 15px;
    margin-top: 10px;
}

/* Hearts */
.heart {
    position: absolute;
    animation: float 6s linear infinite;
    opacity: 0.5;
}
@keyframes float {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}
</style>

</head>

<body>

<div class="card" id="card">
    <h2>Hey Chakli ❤️</h2>
    <p>I want to show you something special...</p>
    <button class="next" onclick="nextStep()">Start 💌</button>
</div>

<audio autoplay loop>
<source src="https://www.bensound.com/bensound-music/bensound-love.mp3">
</audio>

<script>

let step = -1;

const shayari = [
"You are my today, my tomorrow, and all my New Years to come. I pray that our love lasts a lifetime and beyond. Love you my beautiful wife.",
"Another year, another chapter of our love story. May this New Year bring us closer, stronger, and more in love than ever. Let’s stay together—today, tomorrow, and forever.",
"As the clock strikes midnight, I hold onto one wish—that we continue to walk hand in hand through every joy and challenge, living together in love forever.",
"With you by my side, every year feels beautiful. This New Year, I wish us endless love, shared dreams, and a forever that never fades."
];

function nextStep() {
    step++;
    const card = document.getElementById("card");

    if (step < shayari.length) {
        card.innerHTML = `
            <h2>For You Chakli ❤️</h2>
            <h3>💌 Day ${step + 1} of Love</h3>
            <p>${shayari[step]}</p>
            <button class="next" onclick="nextStep()">Next 💌</button>
        `;
    }

    else if (step === shayari.length) {
        card.innerHTML = `
            <h2>One Last Thing ❤️</h2>
            <p>Enter our Love Passcode 🔐</p>
            <input type="password" id="passcode" maxlength="8" placeholder="Enter 8-digit code">
            <br>
            <button class="next" onclick="checkPasscode()">Unlock 💕</button>
            <p id="error" style="color:#ffcccc;"></p>
        `;
    }

    else if (step === shayari.length + 1) {
        card.innerHTML = `
            <h2>Our Journey ❤️</h2>
            <img src="photo.jpg">
            <button class="next" onclick="nextStep()">Continue 💕</button>
        `;
    }

    else {
        card.innerHTML = `
            <h2>Chakli ❤️</h2>
            <p>After everything... I just want to ask you one thing</p>
            <h3>Will you be mine forever?</h3>
            <button class="yes" id="yes"> 💖 Yes 💖 </button>
            <button class="no" id="no"> No </button>
        `;
        setupFinal();
    }
}

// Rest of your JS (passcode, hearts, confetti) remains SAME

</script>

</body>
</html>
