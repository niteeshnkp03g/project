<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Chakli ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Georgia', serif;
    background: linear-gradient(135deg, #2b2e4a, #e84545);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

.card {
    width: 90%;
    max-width: 420px;
    padding: 25px;
    border-radius: 20px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    text-align: center;
    box-shadow: 0 0 40px rgba(0,0,0,0.4);
}

p {
    font-size: 18px;
    line-height: 1.7;
    background: rgba(255,255,255,0.1);
    padding: 15px;
    border-radius: 12px;
}

h3 {
    margin: 10px 0;
    color: #ffd1dc;
}

.next {
    background: white;
    color: #333;
    padding:10px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin-top: 10px;
}

img {
    width: 100%;
    border-radius: 15px;
    margin-top: 10px;
}

.blur {
    filter: blur(20px) brightness(0.7);
    transform: scale(1.05);
    transition: all 2s ease;
}

.clear {
    filter: blur(0) brightness(1);
    transform: scale(1);
}

.heartbeat {
    animation: beat 1s infinite;
}

@keyframes beat {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.05); }
}

.petal {
    position: absolute;
    pointer-events: none;
    animation: fall linear infinite;
}

.title {
    font-size: 28px;
    margin-bottom: 15px;
    color: #fff;
}

.pass-box {
    background: rgba(255,255,255,0.12);
    padding: 20px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
}

.pass-text {
    font-size: 18px;
    margin-bottom: 15px;
}

#passcode {
    width: 80%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    text-align: center;
    font-size: 18px;
    margin-bottom: 15px;
}

.unlock-btn {
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    border: none;
    padding: 12px 25px;
    border-radius: 25px;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

.unlock-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(255, 118, 150, 0.6);
}

#error {
    margin-top: 10px;
    color: #ffd1dc;
}

@keyframes fall {
    0% {
        transform: translateY(-10vh) translateX(0);
        opacity: 1;
    }
    50% {
        transform: translateY(50vh) translateX(20px);
    }
    100% {
        transform: translateY(110vh) translateX(-20px);
        opacity: 0;
    }
}
</style>
</head>

<body>

<div class="card" id="card">
    <h2>Hey Chakli ❤️</h2>
    <p>I want to show you something special...</p>
    <button class="next" onclick="startExperience()">Start 💌</button>
</div>

<script>

let step = -1;

const shayari = [

"Year 1 ❤️\nThe day you entered my life, love stopped feeling like a word and started feeling like home.",

"Year 2 ❤️\nSomewhere between endless conversations and silent understandings, you became my favorite part of every day.",

"Year 3 ❤️\nYour presence slowly turned my chaos into peace, and my ordinary moments into beautiful memories.",

"Year 4 ❤️\nLoving you no longer felt like a choice; it became the most natural part of my existence.",

"Year 5 ❤️\nEven after all this time, your smile still has the power to calm storms inside my heart.",

"Year 6 ❤️\nWe grew together through every happiness, every fight, every fear—and somehow our love only became stronger.",

"Year 7 ❤️\nWith you beside me, forever stopped sounding impossible and started feeling real.",

"Year 8 ❤️\nEight years later, I still look at you with the same wonder—only now, my love carries deeper roots, softer feelings, and a lifetime of certainty."

];

function isBirthdayUnlocked() {

    const now = new Date();

    // Unlocks exactly on 14 May 12:00 AM
    const unlockDate = new Date(now.getFullYear(), 4, 14, 0, 0, 0);

    return now.getTime() >= unlockDate.getTime();
}

function startExperience() {

    const card = document.getElementById("card");

    if (!isBirthdayUnlocked()) {

        card.innerHTML = `
            <h2>Not Yet ❤️</h2>

            <p>
                This little piece of my heart unlocks on <br><br>
                <strong>14 May • 12:00 AM</strong> ✨
            </p>
        `;

        return;
    }

    nextStep();
}

function nextStep() {
    step++;
    const card = document.getElementById("card");

    if (step < shayari.length) {
        card.innerHTML = `
            <h2>For You Chakli ❤️</h2>
            <h3>💖 Year ${step + 1} Together</h3>
            <p>${shayari[step]}</p>
            <button class="next" onclick="nextStep()">Next 💌</button>
        `;
    }

    else if (step === shayari.length) {
        card.innerHTML = `
           <h2 class="title">One Last Thing ❤️</h2>

        <div class="pass-box">
            <p class="pass-text">Enter our Love Passcode 🔐</p>
            <input type="password" id="passcode" placeholder="••••••">
            <button class="unlock-btn" onclick="checkPasscode()">Unlock 💕</button>
            <p id="error"></p>
        </div>
        `;
    }

    else if (step === shayari.length + 1) {
        card.innerHTML = `
            <h2>Our Journey ❤️</h2>
            <img id="loveImage" src="./photo.jpg" class="blur">
            <p id="revealText"></p>
        `;

        setTimeout(revealImage, 1500);
    }
}

async function checkPasscode() {
    const input = document.getElementById("passcode").value;
    const error = document.getElementById("error");

    try {
        const res = await fetch("/.netlify/functions/verify", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ passcode: input })
        });

        const data = await res.json();

        if (data.success) nextStep();
        else error.innerText = "Wrong passcode ❤️";
    } catch {
        error.innerText = "Error";
    }
}

function revealImage() {
    const img = document.getElementById("loveImage");
    img.classList.remove("blur");
    img.classList.add("clear", "heartbeat");

    const text = "Every moment with you is magic ❤️";
    let i = 0;
    const el = document.getElementById("revealText");

    function type() {
        if (i < text.length) {
            el.innerHTML += text.charAt(i);
            i++;
            setTimeout(type, 50);
        }
    }

    type();
}

const items = ["🌹","🌷","🌸","❤️","💕","💖","✨"];

setInterval(() => {

    for (let i = 0; i < 2; i++) {

        const p = document.createElement("div");
        p.className = "petal";

        p.innerHTML = items[Math.floor(Math.random() * items.length)];
        p.style.left = Math.random() * 100 + "vw";
        p.style.fontSize = (Math.random() * 25 + 12) + "px";
        p.style.animationDuration = (Math.random() * 3 + 4) + "s";

        document.body.appendChild(p);

        setTimeout(() => p.remove(), 7000);
    }

}, 600);

</script>

</body>
</html>
