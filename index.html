<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Chakli ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Georgia', serif;
    background: radial-gradient(circle at top, #1a1a2e, #0f3460, #000);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

/* 🌌 Galaxy stars */
.star {
    position: absolute;
    background: white;
    border-radius: 50%;
    opacity: 0.8;
    animation: twinkle 3s infinite ease-in-out;
}
@keyframes twinkle {
    50% { opacity: 1; transform: scale(1.3); }
}

.card {
    width: 90%;
    max-width: 420px;
    padding: 25px;
    border-radius: 20px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    text-align: center;
}

p {
    font-size: 18px;
    background: rgba(255,255,255,0.1);
    padding: 15px;
    border-radius: 12px;
}

h3 { color: #ffd1dc; }

.next {
    background: white;
    color: #333;
    padding:10px 18px;
    border:none;
    border-radius:8px;
}

/* Blur */
.blur {
    filter: blur(20px);
    transition: 2s;
}
.clear { filter: blur(0); }

/* Heartbeat */
.heartbeat {
    animation: beat 1s infinite;
}
@keyframes beat {
    50% { transform: scale(1.05); }
}

/* Falling particles */
.petal {
    position: absolute;
    pointer-events:none;
    animation: fall linear infinite;
}
@keyframes fall {
    0% { transform: translateY(-10vh); }
    100% { transform: translateY(110vh); opacity:0; }
}
</style>
</head>

<body>

<div class="card" id="card">
    <h2>Hey Chakli ❤️</h2>
    <p>I want to show you something special...</p>
    <button class="next" onclick="nextStep()">Start 💌</button>
</div>

<script>

let step = -1;

const shayari = [
"You are my today, my tomorrow, and all my New Years to come. I pray that our love lasts a lifetime and beyond. Love you my beautiful wife.",
"Another year, another chapter of our love story. May this New Year bring us closer, stronger, and more in love than ever. Let’s stay together—today, tomorrow, and forever.",
"As the clock strikes midnight, I hold onto one wish—that we continue to walk hand in hand through every joy and challenge, living together in love forever.",
"With you by my side, every year feels beautiful. This New Year, I wish us endless love, shared dreams, and a forever that never fades."
];

function nextStep() {
    step++;
    const card = document.getElementById("card");

    if (step < shayari.length) {
        card.innerHTML = `
        <h2>For You ❤️</h2>
        <h3>Day ${step+1}</h3>
        <p>${shayari[step]}</p>
        <button class="next" onclick="nextStep()">Next</button>`;
    }

    else if (step === shayari.length) {
        card.innerHTML = `
        <input id="passcode">
        <button onclick="checkPasscode()">Unlock</button>`;
    }

    else if (step === shayari.length+1) {
        card.innerHTML = `
        <img id="img" src="./photo.jpg" class="blur">
        <p id="text"></p>`;
        setTimeout(reveal,1500);
    }
}

async function checkPasscode(){
    const res = await fetch("/.netlify/functions/verify",{method:"POST"});
    const data = await res.json();
    if(data.success) nextStep();
}

/* 💖 Reveal + Burst */
function reveal(){
    const img=document.getElementById("img");
    img.classList.add("clear","heartbeat");

    burstHearts(); // 💓 burst added

    const msg="Every moment with you is magic ❤️";
    let i=0;
    const el=document.getElementById("text");

    function type(){
        if(i<msg.length){
            el.innerHTML+=msg[i++];
            setTimeout(type,50);
        }
    }
    type();
}

/* 💓 Burst effect */
function burstHearts(){
    for(let i=0;i<30;i++){
        let h=document.createElement("div");
        h.innerHTML=["❤️","💕","💖"][Math.floor(Math.random()*3)];
        h.style.position="absolute";
        h.style.left="50%";
        h.style.top="50%";
        h.style.fontSize=(Math.random()*20+15)+"px";
        h.style.transition="1s ease-out";

        document.body.appendChild(h);

        setTimeout(()=>{
            h.style.transform=`translate(${(Math.random()-0.5)*400}px, ${(Math.random()-0.5)*400}px)`;
            h.style.opacity="0";
        },10);

        setTimeout(()=>h.remove(),1000);
    }
}

/* 🌹 Falling emojis */
const items=["🌹","🌷","🌸","❤️","💕","💖","✨"];
setInterval(()=>{
    for(let i=0;i<4;i++){
        let p=document.createElement("div");
        p.className="petal";
        p.innerHTML=items[Math.floor(Math.random()*items.length)];
        p.style.left=Math.random()*100+"vw";
        p.style.fontSize=(Math.random()*25+12)+"px";
        p.style.animationDuration=(Math.random()*3+4)+"s";
        document.body.appendChild(p);
        setTimeout(()=>p.remove(),7000);
    }
},200);

/* 🌌 Galaxy stars */
for(let i=0;i<60;i++){
    let s=document.createElement("div");
    s.className="star";
    let size=Math.random()*3+1;
    s.style.width=size+"px";
    s.style.height=size+"px";
    s.style.left=Math.random()*100+"vw";
    s.style.top=Math.random()*100+"vh";
    document.body.appendChild(s);
}

</script>

</body>
</html>
